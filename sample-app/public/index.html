<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Archetype — Nutrition Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --cream: #FFFBF5;
      --cream-light: #FFF8EF;
      --paper: #FFFCF8;
      --paper-strong: #FFFDFB;
      --sand: #F6EFE4;
      --terracotta: #E07A5F;
      --terracotta-dark: #C4613F;
      --sage: #81B29A;
      --sage-light: rgba(129, 178, 154, 0.1);
      --charcoal: #3D405B;
      --charcoal-soft: #4A4E73;
      --muted: #8D8FA3;
      --warm-gold: #F2CC8F;
      --danger: #E07A5F;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(242, 204, 143, 0.08), transparent 28%),
        linear-gradient(180deg, var(--paper-strong) 0%, var(--cream) 100%);
      color: var(--charcoal);
      -webkit-font-smoothing: antialiased;
      height: 100dvh;
      display: flex;
      justify-content: center;
    }

    /* ─── Layout ────────────────────────────────────────── */

    .app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--charcoal);
      letter-spacing: -0.3px;
    }

    .header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--sage);
    }

    .reset-btn {
      background: none;
      border: 1px solid rgba(61, 64, 91, 0.1);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

    .ledger-section-label {
      padding: 8px 16px 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      border-top: 1px solid rgba(129, 178, 154, 0.08);
    }

    .ledger-memory {
      padding: 6px 16px;
      font-size: 13px;
      color: var(--charcoal);
      border-top: 1px solid rgba(129, 178, 154, 0.05);
    }

    .ledger-memory .category {
      font-size: 11px;
      color: var(--sage);
      margin-left: 6px;
    }

    /* ─── Ledger ─────────────────────────────────────────── */

    .ledger {
      margin: 0 12px;
      border-radius: 16px;
      background: var(--cream-light);
      border: 1px solid rgba(129, 178, 154, 0.15);
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .ledger-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .ledger-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--sage);
    }

    .ledger-summary {
      font-size: 13px;
      font-weight: 500;
      color: var(--charcoal);
    }

    .ledger-toggle {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.25s;
    }

    .ledger.open .ledger-toggle { transform: rotate(180deg); }

    .ledger-items {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .ledger.open .ledger-items {
      max-height: 400px;
    }

    .ledger-item {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      border-top: 1px solid rgba(129, 178, 154, 0.08);
    }

    .ledger-item-name {
      flex: 1;
      font-size: 14px;
      color: var(--charcoal);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ledger-item-meta {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ledger-item-delete {
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .ledger-item:hover .ledger-item-delete { opacity: 1; }
    .ledger-item-delete:hover { color: var(--danger); }

    /* Touch: always show delete on mobile */
    @media (hover: none) {
      .ledger-item-delete { opacity: 0.5; }
    }

    .ledger-edit-input {
      font-family: inherit;
      font-size: 12px;
      width: 60px;
      padding: 2px 6px;
      border: 1px solid rgba(129, 178, 154, 0.3);
      border-radius: 6px;
      background: #fff;
      color: var(--charcoal);
      text-align: right;
      outline: none;
    }

    .ledger-edit-input:focus {
      border-color: var(--sage);
    }

    .ledger-empty {
      padding: 8px 16px 12px;
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      border-top: 1px solid rgba(129, 178, 154, 0.08);
    }

    /* ─── Messages ──────────────────────────────────────── */

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 85%;
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.55;
      border-radius: 18px;
    }

    .msg.user .bubble {
      background: var(--charcoal-soft);
      color: #fff;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
      box-shadow: 0 10px 24px rgba(74, 78, 115, 0.16);
    }

    .msg.assistant .bubble {
      background: rgba(255, 249, 241, 0.98);
      border: 1px solid rgba(242, 204, 143, 0.18);
      border-bottom-left-radius: 4px;
      box-shadow: 0 10px 28px rgba(61, 64, 91, 0.06);
    }

    /* AI markdown */
    .bubble p { margin-bottom: 0.4em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; }
    .bubble ul, .bubble ol { margin: 0.3em 0; padding-left: 1.4em; }
    .bubble li { margin-bottom: 0.15em; }
    .bubble li::marker { color: var(--sage); }
    .bubble h3 { font-weight: 600; font-size: 0.95em; margin: 0.5em 0 0.2em; }
    .bubble a { color: var(--terracotta); }

    /* ─── Typing indicator ──────────────────────────────── */

    .typing { display: flex; justify-content: flex-start; }

    .typing-inner {
      background: var(--cream-light);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 14px 20px;
      display: flex;
      gap: 6px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      animation: typingDot 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* ─── Quick choices ─────────────────────────────────── */

    .choices {
      padding: 0 16px 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .choice-pill {
      padding: 10px 16px;
      background: var(--cream-light);
      border: 1px solid rgba(61, 64, 91, 0.1);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: var(--charcoal);
      cursor: pointer;
      transition: all 0.15s;
    }

    .choice-pill:hover {
      background: var(--terracotta);
      color: #fff;
      border-color: var(--terracotta);
    }

    /* ─── Input ─────────────────────────────────────────── */

    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(61, 64, 91, 0.05);
    }

    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-radius: 28px;
      border: 1px solid rgba(61, 64, 91, 0.08);
      padding: 6px;
      background: rgba(255, 252, 248, 0.94);
      box-shadow: 0 12px 28px rgba(61, 64, 91, 0.06);
    }

    .input-bar textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      color: var(--charcoal);
      background: rgba(255, 255, 255, 0.82);
      border-radius: 18px;
      padding: 10px 16px;
      max-height: 120px;
      line-height: 1.4;
    }

    .input-bar textarea::placeholder { color: var(--muted); }

    .send-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 18px;
      background: var(--charcoal-soft);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
      box-shadow: 0 12px 24px rgba(74, 78, 115, 0.18);
    }

    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { width: 20px; height: 20px; }

    .camera-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .camera-btn:hover { color: var(--charcoal); }
    .camera-btn:disabled { opacity: 0.4; cursor: default; }
    .camera-btn svg { width: 22px; height: 22px; }

    .image-preview {
      position: relative;
      display: inline-block;
      margin-bottom: 8px;
    }

    .image-preview img {
      height: 48px;
      width: 48px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(61, 64, 91, 0.08);
    }

    .image-preview-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: var(--charcoal);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ─── Animations ────────────────────────────────────── */

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeInUp 0.3s ease-out; }

    @keyframes ledgerPulse {
      0% { background-color: var(--cream-light); }
      50% { background-color: var(--sage-light); }
      100% { background-color: var(--cream-light); }
    }

    .ledger-flash { animation: ledgerPulse 0.6s ease; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="header">
      <h1>Guide</h1>
      <button class="reset-btn" onclick="resetApp()">Reset</button>
    </div>

    <!-- Ledger: always visible -->
    <div class="ledger" id="ledger" onclick="toggleLedger(event)">
      <div class="ledger-header">
        <div>
          <span class="ledger-title">Today</span>
          <span class="ledger-summary" id="ledgerSummary"></span>
        </div>
        <span class="ledger-toggle">▾</span>
      </div>
      <div class="ledger-items" id="ledgerItems"></div>
      <div class="ledger-items" id="ledgerMemories"></div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="choices" id="choices"></div>

    <div class="input-area">
      <div id="imagePreviewArea"></div>
      <div class="input-bar">
        <button class="camera-btn" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
        <textarea id="input" rows="1" placeholder="What did you eat today?" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const choicesEl = document.getElementById('choices');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const ledgerEl = document.getElementById('ledger');
    const ledgerSummaryEl = document.getElementById('ledgerSummary');
    const ledgerItemsEl = document.getElementById('ledgerItems');
    const ledgerMemoriesEl = document.getElementById('ledgerMemories');

    let sending = false;
    let pendingImage = null;
    let ledgerMeals = [];
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

    // ─── Ledger ──────────────────────────────────────────

    function toggleLedger(e) {
      // Don't toggle if clicking on interactive elements inside
      if (e.target.closest('.ledger-item-delete') || e.target.closest('.ledger-edit-input')) return;
      ledgerEl.classList.toggle('open');
    }

    function renderLedger(meals, memories, flash) {
      ledgerMeals = meals || [];

      // Summary
      if (ledgerMeals.length === 0) {
        ledgerSummaryEl.textContent = '';
      } else {
        const totalCal = ledgerMeals.reduce((s, m) => s + (m.calories || 0), 0);
        const totalProtein = ledgerMeals.reduce((s, m) => s + (m.protein || 0), 0);
        const parts = [];
        parts.push(`${ledgerMeals.length} meal${ledgerMeals.length !== 1 ? 's' : ''}`);
        if (totalCal > 0) parts.push(`${totalCal} cal`);
        if (totalProtein > 0) parts.push(`${totalProtein}g protein`);
        ledgerSummaryEl.textContent = ' · ' + parts.join(' · ');
      }

      // Meal items
      if (ledgerMeals.length === 0) {
        ledgerItemsEl.innerHTML = '<div class="ledger-empty">No meals yet — tell me what you ate</div>';
      } else {
        ledgerItemsEl.innerHTML = ledgerMeals.map(m => `
          <div class="ledger-item" data-id="${m.id}">
            <span class="ledger-item-name">${escHtml(m.name)}</span>
            <span class="ledger-item-meta" onclick="event.stopPropagation(); editMealCalories('${m.id}', this)" title="Click to edit">
              ${formatMeta(m)}
            </span>
            <button class="ledger-item-delete" onclick="event.stopPropagation(); deleteMeal('${m.id}')" title="Remove">&times;</button>
          </div>
        `).join('');
      }

      // Memories
      const mems = memories || [];
      if (mems.length > 0) {
        ledgerMemoriesEl.innerHTML =
          '<div class="ledger-section-label">Memories</div>' +
          mems.map(m =>
            `<div class="ledger-memory">${escHtml(m.content)}<span class="category">${escHtml(m.category)}</span></div>`
          ).join('');
      } else {
        ledgerMemoriesEl.innerHTML = '';
      }

      if (flash) {
        ledgerEl.classList.add('ledger-flash');
        setTimeout(() => ledgerEl.classList.remove('ledger-flash'), 600);
      }
    }

    function formatMeta(m) {
      const parts = [];
      if (m.calories) parts.push(`${m.calories} cal`);
      if (m.protein) parts.push(`${m.protein}g`);
      return parts.join(' · ') || '—';
    }

    async function deleteMeal(id) {
      try {
        await fetch(`/api/meals/${id}`, { method: 'DELETE' });
        ledgerMeals = ledgerMeals.filter(m => m.id !== id);
        renderLedger(ledgerMeals, null, false);
      } catch {}
    }

    function editMealCalories(id, el) {
      const meal = ledgerMeals.find(m => m.id === id);
      if (!meal) return;

      const current = meal.calories || '';
      el.innerHTML = `<input class="ledger-edit-input" type="number" value="${current}" placeholder="cal" onblur="saveMealEdit('${id}', this)" onkeydown="if(event.key==='Enter')this.blur()">`;
      el.querySelector('input').focus();
    }

    async function saveMealEdit(id, input) {
      const val = parseInt(input.value);
      const calories = isNaN(val) ? undefined : val;
      try {
        const res = await fetch(`/api/meals/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ calories }),
        });
        const data = await res.json();
        if (data.meal) {
          const idx = ledgerMeals.findIndex(m => m.id === id);
          if (idx >= 0) ledgerMeals[idx] = data.meal;
        }
      } catch {}
      renderLedger(ledgerMeals, false);
    }

    async function refreshLedger(chatMeals) {
      try {
        const res = await fetch('/api/ledger', { headers: { 'X-Timezone': tz } });
        const data = await res.json();
        const meals = chatMeals || data.meals;
        const hadNewMeals = chatMeals && chatMeals.length > ledgerMeals.length;
        renderLedger(meals, data.memories, hadNewMeals);
        if (hadNewMeals && !ledgerEl.classList.contains('open')) {
          ledgerEl.classList.add('open');
        }
      } catch {}
    }

    // ─── Input handling ──────────────────────────────────

    function updateSendState() {
      sendBtn.disabled = (!inputEl.value.trim() && !pendingImage) || sending;
    }

    inputEl.addEventListener('input', updateSendState);

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    // ─── Image handling ────────────────────────────────────

    function compressImage(file, maxDim = 800, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              const scale = maxDim / Math.max(width, height);
              width = Math.round(width * scale);
              height = Math.round(height * scale);
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleFileSelect(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        pendingImage = await compressImage(file);
        showImagePreview();
        updateSendState();
      } catch {}
      e.target.value = '';
    }

    function showImagePreview() {
      const area = document.getElementById('imagePreviewArea');
      if (!pendingImage) { area.innerHTML = ''; return; }
      area.innerHTML = `
        <div class="image-preview">
          <img src="${pendingImage}" alt="Attached">
          <button class="image-preview-remove" onclick="clearImage()">&times;</button>
        </div>`;
    }

    function clearImage() {
      pendingImage = null;
      showImagePreview();
      updateSendState();
    }

    // ─── Send message ────────────────────────────────────

    async function send(text) {
      const message = text || inputEl.value.trim();
      const image = text ? null : pendingImage;
      if ((!message && !image) || sending) return;

      if (!text) {
        inputEl.value = '';
        inputEl.style.height = 'auto';
      }
      pendingImage = null;
      showImagePreview();
      sendBtn.disabled = true;
      sending = true;
      choicesEl.innerHTML = '';

      addMessage('user', message, image);
      showTyping();

      try {
        const body = { message };
        if (image) body.image = image;

        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Timezone': tz },
          body: JSON.stringify(body),
        });

        hideTyping();
        if (!res.ok) throw new Error('Request failed');

        const data = await res.json();
        addMessage('assistant', data.message);

        // Refresh ledger — picks up new meals + memories
        refreshLedger(data.meals);

        // Show follow-up pills
        if (data.followUps?.length) {
          showChoices(data.followUps);
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', 'Something went wrong. Try again?');
      }

      sending = false;
      updateSendState();
      inputEl.focus();
    }

    // ─── Render helpers ──────────────────────────────────

    function addMessage(role, content, image) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role} fade-in`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'assistant') {
        const clean = content.split('\n---actions:')[0];
        bubble.innerHTML = marked.parse(clean);
      } else {
        if (image) {
          const img = document.createElement('img');
          img.src = image;
          img.alt = 'Attached photo';
          img.style.cssText = 'max-height:200px;border-radius:12px;margin-bottom:8px;max-width:100%';
          bubble.appendChild(img);
        }
        if (content) {
          const textNode = document.createTextNode(content);
          bubble.appendChild(textNode);
        }
      }

      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'typing fade-in';
      el.id = 'typing';
      el.innerHTML = `<div class="typing-inner"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function hideTyping() {
      document.getElementById('typing')?.remove();
    }

    function showChoices(choices) {
      choicesEl.innerHTML = choices.map(c =>
        `<button class="choice-pill" onclick="send('${escAttr(c)}')">${escHtml(c)}</button>`
      ).join('');
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
      });
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function escAttr(s) {
      return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    // ─── Init ────────────────────────────────────────────

    async function loadGreeting() {
      showTyping();
      try {
        const res = await fetch('/api/greeting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Timezone': tz },
        });
        const data = await res.json();
        hideTyping();
        if (data.greeting) {
          addMessage('assistant', data.greeting);
        }
      } catch {
        hideTyping();
      }
    }

    // ─── Reset ────────────────────────────────────────────

    async function resetApp() {
      await fetch('/api/reset', { method: 'POST' });
      messagesEl.innerHTML = '';
      choicesEl.innerHTML = '';
      ledgerEl.classList.remove('open');
      renderLedger([], [], false);
      loadGreeting();
      inputEl.focus();
    }

    // Initial render
    renderLedger([], [], false);
    loadGreeting();
    refreshLedger();
    inputEl.focus();
  </script>
</body>
</html>
